# Cloud Build configuration for Gianluigi
# Usage: gcloud builds submit --config cloudbuild.yaml .
#
# Prerequisites:
# 1. Enable Cloud Build, Cloud Run, and Container Registry APIs
# 2. Create secrets in GCP Secret Manager (see docs/deployment.md)
# 3. Grant Cloud Build service account permission to deploy to Cloud Run

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gianluigi:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gianluigi:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gianluigi:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gianluigi:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'gianluigi'
      - '--image=gcr.io/$PROJECT_ID/gianluigi:$BUILD_ID'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--min-instances=1'
      - '--max-instances=1'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=3600'
      - '--no-cpu-throttling'
      - '--set-secrets'
      - >-
        ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,
        SUPABASE_URL=SUPABASE_URL:latest,
        SUPABASE_KEY=SUPABASE_KEY:latest,
        TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,
        TELEGRAM_GROUP_CHAT_ID=TELEGRAM_GROUP_CHAT_ID:latest,
        TELEGRAM_EYAL_CHAT_ID=TELEGRAM_EYAL_CHAT_ID:latest,
        GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,
        GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,
        GOOGLE_REFRESH_TOKEN=GOOGLE_REFRESH_TOKEN:latest,
        OPENAI_API_KEY=OPENAI_API_KEY:latest,
        EYAL_EMAIL=EYAL_EMAIL:latest,
        ROYE_EMAIL=ROYE_EMAIL:latest,
        PAOLO_EMAIL=PAOLO_EMAIL:latest,
        YORAM_EMAIL=YORAM_EMAIL:latest,
        CROPSIGHT_OPS_FOLDER_ID=CROPSIGHT_OPS_FOLDER_ID:latest,
        RAW_TRANSCRIPTS_FOLDER_ID=RAW_TRANSCRIPTS_FOLDER_ID:latest,
        MEETING_SUMMARIES_FOLDER_ID=MEETING_SUMMARIES_FOLDER_ID:latest,
        MEETING_PREP_FOLDER_ID=MEETING_PREP_FOLDER_ID:latest,
        WEEKLY_DIGESTS_FOLDER_ID=WEEKLY_DIGESTS_FOLDER_ID:latest,
        DOCUMENTS_FOLDER_ID=DOCUMENTS_FOLDER_ID:latest,
        TASK_TRACKER_SHEET_ID=TASK_TRACKER_SHEET_ID:latest,
        STAKEHOLDER_TRACKER_SHEET_ID=STAKEHOLDER_TRACKER_SHEET_ID:latest,
        EYAL_TELEGRAM_ID=EYAL_TELEGRAM_ID:latest,
        CROPSIGHT_CALENDAR_COLOR_ID=CROPSIGHT_CALENDAR_COLOR_ID:latest,
        GIANLUIGI_EMAIL=GIANLUIGI_EMAIL:latest
      # IMPORTANT: use --update-env-vars (not --set-env-vars). --set-env-vars
      # REPLACES the entire env var set and will wipe anything applied
      # out-of-band — e.g. the TMPDIR=/tmp var added during the 2026-04-11
      # Live Ops Hardening pass that fixes the W15 MoviePy cwd-permission bug.
      # TMPDIR=/tmp is also included here as belt-and-braces so every deploy
      # baked from this config carries it explicitly.
      - '--update-env-vars'
      - 'ENVIRONMENT=staging,LOG_LEVEL=INFO,APPROVAL_MODE=manual,TMPDIR=/tmp'

images:
  - 'gcr.io/$PROJECT_ID/gianluigi:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/gianluigi:latest'
